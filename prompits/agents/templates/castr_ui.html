<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>attas | {{ agent_name }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Mono&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #f0f4f8;
            --panel: rgba(255, 255, 255, 0.7);
            --panel-strong: rgba(255, 255, 255, 0.95);
            --border: rgba(15, 118, 110, 0.1);
            --border-strong: rgba(15, 118, 110, 0.2);
            --text: #1a2e35;
            --muted: #64748b;
            --accent: #0d9488;
            --accent-glow: rgba(13, 148, 136, 0.3);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            --glass: blur(12px);
        }

        * {
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Outfit', sans-serif;
            color: var(--text);
            background: 
                radial-gradient(circle at 0% 0%, rgba(13, 148, 136, 0.15), transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(59, 130, 246, 0.1), transparent 40%),
                var(--bg);
            display: flex;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .header {
            background: var(--panel);
            backdrop-filter: var(--glass);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            margin: 0;
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #0d9488, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .badge {
            background: var(--accent);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .main-card {
            background: var(--panel);
            backdrop-filter: var(--glass);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 2.5rem;
            box-shadow: var(--shadow);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2.5rem;
        }

        .section-title {
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
            margin-bottom: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .form-group label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text);
        }

        select, input {
            background: var(--panel-strong);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.75rem 1rem;
            font-family: inherit;
            font-size: 1rem;
            color: var(--text);
            outline: none;
        }

        select:focus, input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 1rem 2rem;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--accent-glow);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            background: var(--muted);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .phema-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        .phema-item {
            background: var(--panel-strong);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1rem;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .phema-item:hover {
            border-color: var(--accent);
            background: white;
        }

        .phema-item.selected {
            border-color: var(--accent);
            background: rgba(13, 148, 136, 0.05);
            box-shadow: 0 0 0 2px var(--accent);
        }

        .phema-name {
            font-weight: 700;
            font-size: 1rem;
        }

        .phema-desc {
            font-size: 0.85rem;
            color: var(--muted);
            line-height: 1.4;
        }

        .output-panel {
            grid-column: span 2;
            background: rgba(0,0,0,0.03);
            border-radius: 20px;
            padding: 1.5rem;
            display: none;
        }

        .output-panel.visible {
            display: block;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .output-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .output-title {
            font-weight: 800;
            font-size: 0.9rem;
            text-transform: uppercase;
            color: var(--accent);
        }

        .result-box {
            background: white;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            font-family: 'Space Mono', monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            overflow-x: auto;
        }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-strong);
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>{{ agent_name }}</h1>
                <p style="margin: 0.5rem 0 0; color: var(--muted); font-size: 0.9rem;">Cast Phema into professional media outputs.</p>
                <div style="margin-top: 0.5rem; display: flex; align-items: center; gap: 0.5rem;">
                    <span style="font-size: 0.7rem; font-weight: 800; color: var(--accent); opacity: 0.6; text-transform: uppercase;">Plaza</span>
                    <span style="font-size: 0.75rem; font-family: 'Space Mono', monospace; color: var(--muted);">{{ plaza_url }}</span>
                </div>
            </div>
            <div style="display: flex; align-items: center; gap: 1rem;">
                <button class="btn" id="refresh-btn" style="padding: 0.5rem 1rem; font-size: 0.8rem; background: transparent; border: 1px solid var(--accent); color: var(--accent); box-shadow: none;">
                    Refresh Plaza
                </button>
                <div class="badge">{{ media_type }} Castr</div>
            </div>
        </div>

        <div class="main-card">
            <div>
                <div class="section-title">1. Select Phema</div>
                <div id="loading-phemas" style="color: var(--muted); font-size: 0.9rem; margin-bottom: 1rem;">Searching Plaza for Phemas...</div>
                <div class="phema-list" id="phema-list">
                    <!-- Phema items will be injected here -->
                </div>
            </div>

            <div>
                <div class="section-title">2. Configuration</div>
                <div class="form-group">
                    <label>Audience Type</label>
                    <select id="audience-type">
                        <option value="executive">Executive / C-Level</option>
                        <option value="analyst">Technical Analyst</option>
                        <option value="retail">Retail Investor</option>
                        <option value="general">General Public</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Language</label>
                    <select id="language">
                        <option value="en">English (US)</option>
                        <option value="zh">Chinese (Simplified)</option>
                        <option value="ja">Japanese</option>
                        <option value="de">German</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Preferences (Optional)</label>
                    <input type="text" id="preferences" placeholder="e.g. Dark mode, summarize sections...">
                </div>

                <div class="form-group">
                    <label>Target Format</label>
                    <select id="format">
                        <option value="{{ media_type }}">{{ media_type }}</option>
                        <option value="JSON">Raw JSON</option>
                        <option value="MD">Markdown</option>
                    </select>
                </div>

                <div style="margin-top: 2rem;">
                    <button class="btn" id="generate-btn" disabled>
                        <span class="loader" id="loader"></span>
                        <span id="btn-text">Generate Output</span>
                    </button>
                </div>
            </div>

            <div class="output-panel" id="output-panel">
                <div class="output-header">
                    <div class="output-title">Rendering Result</div>
                    <div id="output-badge" class="badge" style="background: #3b82f6;">Ready</div>
                </div>
                <div class="result-box" id="result-box">Success! Your document is being processed.</div>
                <div id="result-actions" style="margin-top: 1rem; display: none;">
                    <a id="view-link" href="#" target="_blank" class="btn" style="background: #3b82f6; text-decoration: none;">
                        View Generated {{ media_type }}
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedPhema = null;
        const refreshBtn = document.getElementById('refresh-btn');
        const phemaListEl = document.getElementById('phema-list');
        const loadingEl = document.getElementById('loading-phemas');
        const generateBtn = document.getElementById('generate-btn');
        const loader = document.getElementById('loader');
        const btnText = document.getElementById('btn-text');
        const outputPanel = document.getElementById('output-panel');
        const resultBox = document.getElementById('result-box');
        const resultActions = document.getElementById('result-actions');
        const viewLink = document.getElementById('view-link');

        async function loadPhemas() {
            try {
                const response = await fetch('/api/plazas/phemas');
                const data = await response.json();
                
                loadingEl.style.display = 'none';
                
                if (data.status === 'success' && data.phemas && data.phemas.length > 0) {
                    data.phemas.forEach(phema => {
                        const item = document.createElement('div');
                        item.className = 'phema-item';
                        item.innerHTML = `
                            <div class="phema-name">${phema.name || 'Untitled Phema'}</div>
                            <div class="phema-desc">${phema.description || 'No description available.'}</div>
                            <div style="font-size: 0.75rem; color: var(--accent); margin-top: 0.2rem;">${phema.owner || 'Unknown'}</div>
                        `;
                        item.onclick = () => selectPhema(phema, item);
                        phemaListEl.appendChild(item);
                    });
                } else {
                    phemaListEl.innerHTML = '<div style="color: var(--muted); font-size: 0.9rem;">No Phemas found on plaza. Try creating one in Phemar first.</div>';
                }
            } catch (error) {
                loadingEl.innerHTML = '<span style="color: var(--danger);">Failed to load Phemas. Check Plaza connection.</span>';
                console.error('Error loading phemas:', error);
            }
        }

        function selectPhema(phema, element) {
            selectedPhema = phema;
            document.querySelectorAll('.phema-item').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            generateBtn.disabled = false;
        }

        generateBtn.onclick = async () => {
            if (!selectedPhema) return;

            generateBtn.disabled = true;
            loader.style.display = 'block';
            btnText.innerText = 'Casting...';
            outputPanel.classList.remove('visible');
            resultActions.style.display = 'none';

            const payload = {
                phema: selectedPhema,
                format: document.getElementById('format').value,
                preferences: {
                    audience: document.getElementById('audience-type').value,
                    language: document.getElementById('language').value,
                    custom: document.getElementById('preferences').value
                }
            };

            try {
                const response = await fetch('/api/cast_phema', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();

                resultBox.innerText = JSON.stringify(result, null, 4);
                
                if (result.url) {
                    viewLink.href = result.url;
                    resultActions.style.display = 'block';
                }

                outputPanel.classList.add('visible');
            } catch (error) {
                resultBox.innerText = 'Error: ' + error.message;
                outputPanel.classList.add('visible');
            } finally {
                generateBtn.disabled = false;
                loader.style.display = 'none';
                btnText.innerText = 'Generate Output';
            }
        };

        refreshBtn.onclick = () => {
            phemaListEl.innerHTML = '';
            loadingEl.style.display = 'block';
            loadingEl.innerHTML = 'Refreshing Plaza...';
            loadPhemas();
        };

        window.onload = loadPhemas;
    </script>
</body>

</html>
