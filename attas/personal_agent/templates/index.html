<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>attas Personal Agent</title>
    <link rel="stylesheet" href="{{ url_for('static', path='personal_agent.css') }}?v={{ asset_version or 'dev' }}">
</head>
<body data-theme="mercury" data-sidebar="expanded">
    <div class="backdrop"></div>
    <div class="grain"></div>
    <div class="shell">
        <aside class="rail panel" id="left-rail">
            <div class="rail-topbar">
                <div class="brand-block">
                    <div class="brand-mark">attas</div>
                    <p class="brand-copy">
                        Personal Agent
                        <span>Windowed research workspace for pulses, providers, routing, and portfolio action.</span>
                    </p>
                </div>
                <button type="button" class="sidebar-toggle" data-sidebar-toggle aria-label="Toggle sidebar">Collapse</button>
            </div>

            <div class="rail-content">
                <div class="rail-section">
                    <p class="section-label">System</p>
                    <ul class="meta-list" id="system-meta"></ul>
                </div>

                <div class="rail-section">
                    <p class="section-label">Theme</p>
                    <div class="theme-switcher">
                        <button type="button" class="theme-chip is-active" data-theme-target="mercury">Mercury Ledger</button>
                        <button type="button" class="theme-chip" data-theme-target="paper">Signal Paper</button>
                        <button type="button" class="theme-chip" data-theme-target="after-hours">After Hours</button>
                    </div>
                </div>

                <div class="rail-section">
                    <p class="section-label">Coverage</p>
                    <div class="coverage-stack" id="coverage-stack"></div>
                </div>

                <div class="rail-section">
                    <p class="section-label">Settings</p>
                    <div class="settings-card" id="settings-card"></div>
                </div>
            </div>
        </aside>

        <main class="stage">
            <header class="menu-bar panel">
                <div class="menu-cluster">
                    <button type="button" class="menu-trigger" data-sidebar-toggle>Sidebar</button>
                    <div class="menu-group" data-menu-group="file">
                        <button type="button" class="menu-trigger" data-menu-trigger="file">File</button>
                        <div class="menu-dropdown" data-menu-panel="file">
                            <button type="button" class="menu-item" data-menu-action="new-workspace">New Workspace</button>
                            <button type="button" class="menu-item" data-menu-action="open-settings">Settings</button>
                        </div>
                    </div>
                    <div class="menu-group" data-menu-group="window">
                        <button type="button" class="menu-trigger" data-menu-trigger="window">Window</button>
                        <div class="menu-dropdown" data-menu-panel="window">
                            <button type="button" class="menu-item" data-menu-action="new-browser-window">New Browser Window</button>
                        </div>
                    </div>
                </div>
                <div class="menu-meta">
                    <div class="menu-status" id="menu-status"></div>
                    <div class="menu-quick-actions">
                        <button type="button" class="window-command" data-menu-action="new-workspace">New Workspace</button>
                        <button type="button" class="window-command" data-menu-action="new-browser-window">New Browser Window</button>
                        <button type="button" class="window-command" data-menu-action="open-settings">Settings</button>
                    </div>
                </div>
            </header>

            <section class="market-frontline panel">
                <div class="market-frontline-head">
                    <div class="market-frontline-copy">
                        <p class="section-label">Front Page</p>
                        <h1 id="frontline-heading"></h1>
                        <p class="frontline-summary" id="frontline-summary"></p>
                    </div>
                    <div class="market-pulse" id="market-pulse"></div>
                </div>
                <div class="frontline-grid" id="frontline-grid"></div>
            </section>

            <section class="workspace-stage">
                <div class="workspace-plane" id="workspace-plane">
                    <section class="workspace-dock panel">
                        <div class="workspace-dock-head">
                            <div>
                                <p class="section-label">Workspace Dock</p>
                                <h2 id="workspace-title"></h2>
                                <p class="dock-summary" id="workspace-summary"></p>
                            </div>
                            <div class="dock-meta">
                                <div class="status-strip">
                                    <span class="status-dot"></span>
                                    <span id="connection-pill"></span>
                                </div>
                                <div class="dock-pill-row" id="workspace-pane-list"></div>
                            </div>
                        </div>
                        <div class="workspace-canvas" id="workspace-canvas"></div>
                    </section>
                    <div class="floating-layer" id="floating-layer"></div>
                </div>

                <aside class="workspace-sidebar">
                    <section class="panel sidebar-block">
                        <div class="sidebar-head">
                            <div>
                                <p class="section-label">Workspaces</p>
                                <h2>Deck</h2>
                            </div>
                        </div>
                        <div class="workspace-switch-list" id="workspace-list"></div>
                    </section>

                    <section class="panel sidebar-block">
                        <div class="sidebar-head">
                            <div>
                                <p class="section-label">Network Events</p>
                                <h2>Activity Relay</h2>
                            </div>
                        </div>
                        <div class="activity-list" id="activity-list"></div>
                    </section>
                </aside>
            </section>
        </main>
    </div>

    <div class="modal-shell" id="settings-modal" hidden>
        <section class="settings-modal panel" role="dialog" aria-modal="true" aria-labelledby="settings-modal-title">
            <header class="settings-modal-head">
                <div>
                    <p class="section-label">Preferences</p>
                    <h2 id="settings-modal-title">Settings</h2>
                </div>
                <button type="button" class="window-command" data-settings-close>Close</button>
            </header>
            <div class="settings-modal-body settings-modal-layout">
                <aside class="settings-tab-rail">
                    <div class="settings-identity" id="settings-identity"></div>
                    <nav class="settings-tab-list" id="settings-tab-list" aria-label="Settings sections"></nav>
                    <div class="settings-summary-card" id="settings-summary"></div>
                </aside>

                <section class="settings-panel">
                    <div id="settings-panel-content"></div>
                    <div class="settings-modal-actions">
                        <button type="button" class="window-command" data-settings-reset>Reset Defaults</button>
                    </div>
                </section>
            </div>
        </section>
    </div>

    <script>
        window.__ATTAS_BOOTSTRAP__ = {{ initial_payload | tojson }};
        window.__ATTAS_ASSET_VERSION__ = {{ (asset_version or 'dev') | tojson }};
    </script>
    <script src="{{ url_for('static', path='personal_agent.js') }}?v={{ asset_version or 'dev' }}"></script>
</body>
</html>
